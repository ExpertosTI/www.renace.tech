<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal de Clientes — Renace.tech</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Sora:wght@600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #040912;
      --surface: #0d1829;
      --surface-2: #111f36;
      --border: rgba(148, 163, 184, 0.14);
      --border-focus: rgba(99, 102, 241, 0.7);
      --text: #dce6f4;
      --muted: #7b93b0;
      --accent: #6366f1;
      --accent-2: #8b5cf6;
      --good: #34d399;
      --bad: #f87171;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: 'Manrope', -apple-system, BlinkMacSystemFont, sans-serif;
      background:
        radial-gradient(ellipse at 20% 20%, rgba(99, 102, 241, 0.12), transparent 50%),
        radial-gradient(ellipse at 80% 80%, rgba(139, 92, 246, 0.09), transparent 50%),
        var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 420px;
    }

    .brand {
      text-align: center;
      margin-bottom: 2rem;
    }

    .brand-logo {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 58px;
      height: 58px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      border-radius: 16px;
      font-size: 1.7rem;
      margin-bottom: 1rem;
      box-shadow: 0 0 0 1px rgba(99, 102, 241, 0.3), 0 16px 40px rgba(99, 102, 241, 0.25);
    }

    .brand h1 {
      font-family: 'Sora', sans-serif;
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    .brand p {
      color: var(--muted);
      font-size: 0.875rem;
      margin-top: 4px;
    }

    .card {
      background: linear-gradient(160deg, rgba(13, 24, 41, 0.95), rgba(10, 18, 32, 0.92));
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2rem;
      backdrop-filter: blur(12px);
      box-shadow: 0 24px 64px rgba(0, 0, 0, 0.5);
    }

    .card-title {
      font-family: 'Sora', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 0.35rem;
    }

    .card-subtitle {
      color: var(--muted);
      font-size: 0.825rem;
      margin-bottom: 1.75rem;
      line-height: 1.5;
    }

    .field {
      margin-bottom: 1.1rem;
    }

    label {
      display: block;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #7b9ec0;
      margin-bottom: 6px;
    }

    .input-wrap {
      position: relative;
    }

    .input-wrap .input-icon {
      position: absolute;
      left: 13px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 0.9rem;
      pointer-events: none;
    }

    input[type="text"],
    input[type="email"],
    input[type="password"] {
      width: 100%;
      background: rgba(8, 15, 30, 0.7);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 11px 13px 11px 38px;
      color: var(--text);
      font-family: inherit;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      -webkit-appearance: none;
    }

    input[type="text"]:focus,
    input[type="email"]:focus,
    input[type="password"]:focus {
      border-color: var(--border-focus);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
    }

    input::placeholder { color: #4a6180; }

    .toggle-pass {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      padding: 2px;
      font-size: 0.85rem;
      line-height: 1;
    }

    .toggle-pass:hover { color: var(--text); }

    .btn-submit {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      border: none;
      border-radius: 10px;
      color: #fff;
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: opacity 0.2s, transform 0.15s;
      position: relative;
      overflow: hidden;
    }

    .btn-submit:hover:not(:disabled) { opacity: 0.92; transform: translateY(-1px); }
    .btn-submit:active:not(:disabled) { transform: translateY(0); }
    .btn-submit:disabled { opacity: 0.55; cursor: not-allowed; }

    .btn-inner {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .error-msg {
      display: none;
      margin-top: 1rem;
      padding: 10px 13px;
      background: rgba(248, 113, 113, 0.1);
      border: 1px solid rgba(248, 113, 113, 0.3);
      border-radius: 8px;
      color: #fca5a5;
      font-size: 0.825rem;
      line-height: 1.4;
    }

    .error-msg.show { display: flex; gap: 8px; align-items: flex-start; }

    .footer-note {
      text-align: center;
      margin-top: 1.5rem;
      color: var(--muted);
      font-size: 0.78rem;
    }

    .footer-note a {
      color: #7dd3fc;
      text-decoration: none;
    }

    .footer-note a:hover { text-decoration: underline; }

    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 1.4rem 0;
    }

    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .divider span {
      color: var(--muted);
      font-size: 0.75rem;
      white-space: nowrap;
    }

    @media (max-width: 480px) {
      .card { padding: 1.5rem; border-radius: 16px; }
      body { padding: 14px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="brand">
      <div class="brand-logo">🚀</div>
      <h1>Renace.tech</h1>
      <p>Portal de acceso a clientes</p>
    </div>

    <div class="card">
      <div class="card-title">Iniciar sesión</div>
      <div class="card-subtitle">Ingresa con tus credenciales de Odoo para acceder a tu plataforma.</div>

      <form id="portal-form" novalidate>
        <div class="field">
          <label for="login">Usuario o correo electrónico</label>
          <div class="input-wrap">
            <span class="input-icon">👤</span>
            <input
              id="login"
              name="login"
              type="text"
              placeholder="usuario@empresa.com"
              autocomplete="username"
              required
            >
          </div>
        </div>

        <div class="field">
          <label for="password">Contraseña</label>
          <div class="input-wrap">
            <span class="input-icon">🔒</span>
            <input
              id="password"
              name="password"
              type="password"
              placeholder="Tu contraseña de Odoo"
              autocomplete="current-password"
              required
            >
            <button type="button" class="toggle-pass" id="toggle-pass" aria-label="Mostrar contraseña">👁</button>
          </div>
        </div>

        <button type="submit" class="btn-submit" id="btn-submit">
          <span class="btn-inner">
            <div class="spinner" id="spinner"></div>
            <span id="btn-text">Acceder a mi plataforma</span>
          </span>
        </button>

        <div class="error-msg" id="error-msg">
          <span>⚠️</span>
          <span id="error-text"></span>
        </div>
      </form>

      <div class="divider"><span>¿Necesitas ayuda?</span></div>

      <div class="footer-note">
        Contacta a <a href="mailto:info@renace.tech">info@renace.tech</a> si tienes problemas para acceder.
      </div>
    </div>

    <p style="text-align:center;margin-top:1.25rem;color:#374d66;font-size:0.75rem;">
      © 2025 Renace.tech · <a href="/" style="color:#4a6180;text-decoration:none;">Inicio</a>
    </p>
  </div>

  <script>
    const form     = document.getElementById('portal-form');
    const btnSubmit = document.getElementById('btn-submit');
    const spinner  = document.getElementById('spinner');
    const btnText  = document.getElementById('btn-text');
    const errorMsg = document.getElementById('error-msg');
    const errorTxt = document.getElementById('error-text');
    const togglePass = document.getElementById('toggle-pass');
    const passInput  = document.getElementById('password');

    togglePass.addEventListener('click', () => {
      const isPass = passInput.type === 'password';
      passInput.type = isPass ? 'text' : 'password';
      togglePass.textContent = isPass ? '🙈' : '👁';
    });

    function setLoading(on) {
      btnSubmit.disabled = on;
      spinner.style.display = on ? 'block' : 'none';
      btnText.textContent = on ? 'Verificando…' : 'Acceder a mi plataforma';
    }

    function showError(msg) {
      errorTxt.textContent = msg;
      errorMsg.classList.add('show');
    }

    function hideError() {
      errorMsg.classList.remove('show');
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideError();

      const login    = document.getElementById('login').value.trim();
      const password = passInput.value;

      if (!login || !password) {
        showError('Por favor completa usuario y contraseña.');
        return;
      }

      setLoading(true);

      try {
        const res = await fetch('/api/portal/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ login, password }),
        });

        const contentType = res.headers.get('content-type') || '';

        if (res.ok && contentType.includes('text/html')) {
          const html = await res.text();
          document.open();
          document.write(html);
          document.close();
          return;
        }

        const data = await res.json().catch(() => ({ error: 'Respuesta inesperada del servidor.' }));
        showError(data.error || 'Error al iniciar sesión. Intenta de nuevo.');
      } catch {
        showError('No se pudo conectar con el servidor. Verifica tu conexión.');
      } finally {
        setLoading(false);
      }
    });
  </script>
</body>
</html>
