version: '3.8'

services:
  renace-form:
    container_name: renace-branding-form
    build: .
    restart: always
    ports:
      # Mapea el puerto 8555 (menos común) del host al 80 del contenedor
      # Acceso directo: http://su-ip:8555/
      # Acceso por dominio (con Nginx Proxy): renace.tech/form
      - "8555:80"
    volumes:
      # Persistencia de datos: el data.json del host se sincroniza
      - ./data.json:/var/www/html/data.json
