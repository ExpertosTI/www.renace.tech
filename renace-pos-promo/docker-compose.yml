version: '3.8'

services:
  web:
    image: renace-crm-promo:latest
    build:
      context: .
      dockerfile: Dockerfile
    networks:
      - RenaceNet
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      resources:
        limits:
          cpus: '0.20'
          memory: 256M
      labels:
        - "traefik.enable=true"
        # HTTP
        - "traefik.http.routers.crm-promo-http.rule=Host(`renace.tech`) && PathPrefix(`/crm`)"
        - "traefik.http.routers.crm-promo-http.entrypoints=web"
        - "traefik.http.routers.crm-promo-http.middlewares=crm-promo-redirect-https"
        - "traefik.http.routers.crm-promo-http.priority=100"
        # HTTPS
        - "traefik.http.routers.crm-promo-https.rule=Host(`renace.tech`) && PathPrefix(`/crm`)"
        - "traefik.http.routers.crm-promo-https.entrypoints=websecure"
        - "traefik.http.routers.crm-promo-https.tls=true"
        - "traefik.http.routers.crm-promo-https.tls.certresolver=letsencryptresolver"
        - "traefik.http.routers.crm-promo-https.middlewares=crm-promo-stripprefix"
        - "traefik.http.routers.crm-promo-https.priority=100"
        # Middlewares
        - "traefik.http.middlewares.crm-promo-redirect-https.redirectscheme.scheme=https"
        - "traefik.http.middlewares.crm-promo-stripprefix.stripprefix.prefixes=/crm"
        # Service
        - "traefik.http.services.crm-promo-svc.loadbalancer.server.port=80"
        - "traefik.docker.network=RenaceNet"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  RenaceNet:
    external: true
