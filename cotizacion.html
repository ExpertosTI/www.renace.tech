<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Solicitud de Cotización - Renace</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <style>
    :root { color-scheme: dark; }
    body { margin:0; font-family: 'Inter', system-ui, -apple-system, sans-serif; background:#080d1a; color:#e5e7eb; }
    .wrap { max-width: 900px; margin: 0 auto; padding: 24px; }
    .card { background:#0f172a; border:1px solid #1f2a44; border-radius:16px; padding:20px; box-shadow:0 10px 30px rgba(0,0,0,0.35); }
    h1 { margin:0 0 6px; font-size: 26px; }
    p { margin:6px 0 12px; color:#9ca3af; }
    label { display:block; font-size:12px; text-transform:uppercase; letter-spacing:0.5px; margin-bottom:6px; color:#9ca3af; }
    input, select, textarea { width:100%; padding:12px; border-radius:10px; border:1px solid #1f2a44; background:#0b1224; color:#e5e7eb; font-size:14px; }
    textarea { resize:vertical; min-height:100px; }
    .grid { display:grid; gap:12px; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); }
    button { background:#2563eb; color:white; border:none; padding:12px 16px; border-radius:10px; font-weight:700; cursor:pointer; width:100%; }
    button:disabled { opacity:0.6; cursor:not-allowed; }
    .muted { color:#9ca3af; font-size:13px; }
    .error { color:#f87171; font-size:13px; margin-top:8px; }
    .success { color:#34d399; font-size:13px; margin-top:8px; }
    .badge { display:inline-block; padding:4px 8px; background:#1d4ed8; color:white; border-radius:999px; font-size:11px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="flex" style="display:flex; justify-content:space-between; align-items:center; gap:12px;">
        <div>
          <div class="badge">Solicitud de Cotización</div>
          <h1>Cuéntanos de tu negocio</h1>
          <p>Completa el formulario. Valida que el enlace incluya un token válido.</p>
        </div>
        <div id="token-status" class="muted">Validando token...</div>
      </div>

      <form id="quote-form" class="space-y" style="display:grid; gap:14px; margin-top:12px;">
        <div class="grid">
          <div>
            <label for="name">Nombre de contacto *</label>
            <input id="name" name="name" required placeholder="Tu nombre">
          </div>
          <div>
            <label for="email">Email *</label>
            <input id="email" name="email" type="email" required placeholder="correo@dominio.com">
          </div>
          <div>
            <label for="phone">Teléfono</label>
            <input id="phone" name="phone" placeholder="WhatsApp o teléfono">
          </div>
        </div>

        <div>
          <label for="business">Modelo de negocio *</label>
          <input id="business" name="business" required placeholder="Describe brevemente">
        </div>

        <div class="grid">
          <div>
            <label for="cashiers">Cajeras</label>
            <input id="cashiers" name="cashiers" inputmode="numeric" placeholder="Ej. 5">
          </div>
          <div>
            <label for="employees">Empleados</label>
            <input id="employees" name="employees" inputmode="numeric" placeholder="Ej. 30">
          </div>
          <div>
            <label for="revenue">Facturación mensual aprox.</label>
            <input id="revenue" name="revenue" placeholder="Ej. $50,000 USD">
          </div>
        </div>

        <div>
          <label for="message">Mensaje / requerimientos</label>
          <textarea id="message" name="message" placeholder="Describe necesidades, plazos, integraciones..."></textarea>
        </div>

        <button type="submit" id="submitBtn">Enviar solicitud</button>
        <div id="form-message" class="muted"></div>
      </form>
    </div>
  </div>

  <script>
    const qs = new URLSearchParams(window.location.search);
    const token = qs.get('token') || '';
    const statusEl = document.getElementById('token-status');
    const form = document.getElementById('quote-form');
    const msgEl = document.getElementById('form-message');
    const submitBtn = document.getElementById('submitBtn');

    function setMsg(text, type='muted') {
      msgEl.textContent = text;
      msgEl.className = type === 'error' ? 'error' : type === 'success' ? 'success' : 'muted';
    }

    async function validateToken() {
      if (!token) {
        statusEl.textContent = 'Token faltante';
        form.style.display = 'none';
        return;
      }
      statusEl.textContent = 'Validando token...';
      try {
        const res = await fetch(`/api/quote/validate?token=${encodeURIComponent(token)}`);
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Token inválido');
        statusEl.textContent = 'Token válido';
      } catch (e) {
        statusEl.textContent = e.message;
        form.style.display = 'none';
      }
    }

    async function submitForm(ev) {
      ev.preventDefault();
      setMsg('Enviando...');
      submitBtn.disabled = true;
      const payload = {
        token,
        name: form.name.value.trim(),
        email: form.email.value.trim(),
        phone: form.phone.value.trim(),
        business: form.business.value.trim(),
        cashiers: form.cashiers.value.trim(),
        employees: form.employees.value.trim(),
        revenue: form.revenue.value.trim(),
        message: form.message.value.trim(),
      };
      try {
        const res = await fetch('/api/quote/submit', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Error al enviar');
        setMsg('Solicitud enviada. ¡Gracias!', 'success');
        form.reset();
      } catch (e) {
        setMsg(e.message, 'error');
      } finally {
        submitBtn.disabled = false;
      }
    }

    form.addEventListener('submit', submitForm);
    validateToken();
  </script>
</body>
</html>
