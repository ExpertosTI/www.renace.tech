# ============================================================
# RENACE.TECH — Nginx config adaptado para stack Docker
#
# Servicios:
#   Node.js app  →  127.0.0.1:3000   (Express + static)
#   Odoo core    →  127.0.0.1:7015   (HTTP workers)
#   Odoo gevent  →  127.0.0.1:7018   (WebSocket / longpolling)
#
# Problema resuelto: cuando Odoo renderiza /odoo/web/login,
# genera URLs de assets como /web/assets/... que el navegador
# pide sin el prefijo /odoo/. Estas rutas van directo a Odoo.
# ============================================================

# ── Upstreams ────────────────────────────────────────────────
upstream renace_node {
    server 127.0.0.1:3000;
    keepalive 32;
}

upstream renace_odoo {
    server 127.0.0.1:7015;
    keepalive 16;
}

upstream renace_gevent {
    server 127.0.0.1:7018;
    keepalive 8;
}

# ── Rate limiting ────────────────────────────────────────────
limit_req_zone $binary_remote_addr zone=general:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=api:10m     rate=10r/s;

# ── HTTP → HTTPS redirect ────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name renace.tech www.renace.tech;
    return 301 https://$host$request_uri;
}

# ── HTTPS principal ──────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name renace.tech www.renace.tech;

    # SSL
    ssl_certificate     /etc/letsencrypt/live/renace.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/renace.tech/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options         "SAMEORIGIN"                   always;
    add_header X-Content-Type-Options  "nosniff"                      always;
    add_header X-XSS-Protection        "1; mode=block"                always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy      "camera=(), microphone=(), geolocation=()" always;
    server_tokens off;

    # Logs
    access_log /var/log/nginx/renace.access.log;
    error_log  /var/log/nginx/renace.error.log;

    # Tuning
    client_max_body_size  128M;
    proxy_read_timeout    900s;
    proxy_connect_timeout 60s;
    proxy_send_timeout    900s;

    # Compression
    gzip on;
    gzip_types text/css text/plain text/xml application/json application/javascript;
    gzip_proxied any;
    gzip_min_length 1024;

    # Shared proxy headers macro (repeated inline — nginx has no macros without modules)
    # Defined as a map so each location just references $proxy_host_hdr
    proxy_set_header Host              $host;
    proxy_set_header X-Forwarded-Host  $host;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Real-IP         $remote_addr;

    # ── 1. WebSocket / Longpolling → Odoo gevent (port 7018) ──
    location ^~ /websocket {
        proxy_pass http://renace_gevent;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host               $host;
        proxy_set_header X-Forwarded-Host   $host;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  https;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_read_timeout 3600s;
    }

    location ^~ /odoo/longpolling {
        proxy_pass http://renace_gevent;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host               $host;
        proxy_set_header X-Forwarded-Host   $host;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  https;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_read_timeout 3600s;
    }

    # ── 2. Odoo UI paths → Odoo core (port 7015) ─────────────
    # These paths are generated by Odoo in its HTML (assets, portal, etc.)
    # They must bypass the Node.js app completely.

    location ^~ /web {
        proxy_pass http://renace_odoo;
        proxy_redirect off;
    }

    location ^~ /portal {
        proxy_pass http://renace_odoo;
        proxy_redirect off;
    }

    location ^~ /report {
        proxy_pass http://renace_odoo;
        proxy_redirect off;
    }

    location ^~ /website {
        proxy_pass http://renace_odoo;
        proxy_redirect off;
    }

    location ^~ /xmlrpc {
        proxy_pass http://renace_odoo;
    }

    location ^~ /jsonrpc {
        proxy_pass http://renace_odoo;
    }

    location ^~ /payment {
        proxy_pass http://renace_odoo;
        proxy_redirect off;
    }

    location ^~ /my {
        proxy_pass http://renace_odoo;
        proxy_redirect off;
    }

    # Product / record images (e.g. /web/image/product.template/...)
    location ~* /image/ {
        proxy_pass http://renace_odoo;
    }

    # Odoo static assets (fonts, icons, etc. not under /web)
    location ~* ^/[^/]+/static/ {
        proxy_pass   http://renace_odoo;
        expires      7d;
        add_header   Cache-Control "public, immutable";
    }

    # ── 3. Node.js API (rate limited) → Node app (port 3000) ──
    location ^~ /api {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://renace_node;
    }

    # ── 4. Main entry → Node.js app ───────────────────────────
    # Node serves the React/static site + any fallback routes.
    location / {
        limit_req zone=general burst=50 nodelay;
        proxy_pass http://renace_node;

        # Pass upgrade headers for any WS the Node app might handle
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}

# ── WebSocket upgrade map ────────────────────────────────────
# (place this in the http {} block of nginx.conf if not already present)
#
# map $http_upgrade $connection_upgrade {
#     default   upgrade;
#     ''        close;
# }
