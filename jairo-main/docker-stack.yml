version: '3.8'

services:
  # ─── Base de Datos Propia de Jairo ────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-jairo}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-jairo_secure_2026}
      POSTGRES_DB: ${DB_NAME:-jairo_db}
    volumes:
      - jairo_db_data:/var/lib/postgresql/data
    networks:
      - jairo_internal
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      resources:
        limits:
          memory: 512M

  # ─── Redis (Cache) ────────────────────────────────────────────────────────
  redis:
    image: redis:alpine
    networks:
      - jairo_internal
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      resources:
        limits:
          memory: 128M

  # ─── Meilisearch (Búsqueda) ───────────────────────────────────────────────
  meilisearch:
    image: getmeili/meilisearch:v1.6
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-jairo_meili_key_2026}
    volumes:
      - jairo_meili_data:/meili_data
    networks:
      - jairo_internal
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      resources:
        limits:
          memory: 256M

  # ─── API (NestJS) ─────────────────────────────────────────────────────────
  api:
    image: ghcr.io/expertosti/jairo-api:latest
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-jairo}:${DB_PASSWORD:-jairo_secure_2026}@postgres:5432/${DB_NAME:-jairo_db}
      - REDIS_URL=redis://redis:6379
      - MEILISEARCH_HOST=http://meilisearch:7700
      - MEILISEARCH_API_KEY=${MEILI_MASTER_KEY}
      - NODE_ENV=production
      - PORT=3001
      - JWT_SECRET=${JWT_SECRET}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - SMTP_FROM=${SMTP_FROM}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_CALLBACK_URL=${GOOGLE_CALLBACK_URL}
    networks:
      - jairo_internal
      - RenaceNet
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      resources:
        limits:
          memory: 512M
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.jairo-api.rule=Host(`jairoapp.renace.tech`) && PathPrefix(`/api`)"
        - "traefik.http.routers.jairo-api.priority=100"
        - "traefik.http.routers.jairo-api.entrypoints=websecure"
        - "traefik.http.routers.jairo-api.tls=true"
        - "traefik.http.routers.jairo-api.tls.certresolver=letsencryptresolver"
        - "traefik.http.middlewares.api-strip.stripprefix.prefixes=/api"
        - "traefik.http.middlewares.api-cors.headers.accesscontrolallowmethods=GET,POST,PUT,DELETE,OPTIONS"
        - "traefik.http.middlewares.api-cors.headers.accesscontrolalloworiginlist=https://jairoapp.renace.tech"
        - "traefik.http.middlewares.api-cors.headers.accesscontrolmaxage=100"
        - "traefik.http.routers.jairo-api.middlewares=api-strip,api-cors"
        - "traefik.http.services.jairo-api.loadbalancer.server.port=3001"
        - "traefik.docker.network=RenaceNet"
    depends_on:
      - postgres
      - redis
      - meilisearch

  # ─── Web (Next.js) ────────────────────────────────────────────────────────
  web:
    image: ghcr.io/expertosti/jairo-web:latest
    environment:
      - NEXT_PUBLIC_API_URL=https://jairoapp.renace.tech/api
      - NODE_ENV=production
      - HOSTNAME=0.0.0.0
    networks:
      - jairo_internal
      - RenaceNet
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      resources:
        limits:
          memory: 512M
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.jairo-web.rule=Host(`jairoapp.renace.tech`)"
        - "traefik.http.routers.jairo-web.priority=1"
        - "traefik.http.routers.jairo-web.entrypoints=websecure"
        - "traefik.http.routers.jairo-web.tls=true"
        - "traefik.http.routers.jairo-web.tls.certresolver=letsencryptresolver"
        - "traefik.http.services.jairo-web.loadbalancer.server.port=3000"
        - "traefik.docker.network=RenaceNet"
    depends_on:
      - api

networks:
  jairo_internal:
    driver: overlay
  RenaceNet:
    external: true

volumes:
  jairo_db_data:
  jairo_meili_data:
