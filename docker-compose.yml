version: '3.8'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - renace_db_data:/var/lib/postgresql/data
    networks:
      - renace_internal
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
        reservations:
          cpus: '0.10'
          memory: 128M

  app:
    image: renace-app:latest
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL}
      NEXT_PUBLIC_BASE_URL: ${NEXT_PUBLIC_BASE_URL}
      ADMIN_ACCESS_PASSWORD: ${ADMIN_ACCESS_PASSWORD}
      ADMIN_SESSION_SECRET: ${ADMIN_SESSION_SECRET}
      PARTICIPANT_SESSION_SECRET: ${PARTICIPANT_SESSION_SECRET}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM: ${SMTP_FROM}
      NODE_ENV: production
    depends_on:
      - db
    networks:
      - renace_internal
      - RenaceNet
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      resources:
        limits:
          cpus: '0.80'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.renace.rule=Host(`${APP_HOST}`)"
        - "traefik.http.routers.renace.entrypoints=websecure"
        - "traefik.http.routers.renace.tls=true"
        - "traefik.http.routers.renace.tls.certresolver=letsencryptresolver"
        - "traefik.http.services.renace.loadbalancer.server.port=3000"
        - "traefik.docker.network=RenaceNet"

volumes:
  renace_db_data:
    driver: local

networks:
  renace_internal:
    driver: overlay
  RenaceNet:
    external: true
