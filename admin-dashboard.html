<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Admin - Renace</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <style>
    :root { color-scheme: dark; }
    body { margin: 0; font-family: 'Inter', system-ui, -apple-system, sans-serif; background:#0b1020; color:#e5e7eb; }
    .wrap { max-width: 1100px; margin: 0 auto; padding: 24px; }
    header { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; }
    h1 { font-size: 24px; margin: 0; }
    .card { background:#11182d; border:1px solid #1f2a44; border-radius:12px; padding:16px; margin-bottom:16px; box-shadow:0 10px 25px rgba(0,0,0,0.25); }
    .grid { display:grid; gap:16px; }
    .grid-3 { grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); }
    label { display:block; font-size:12px; color:#9ca3af; margin-bottom:6px; }
    input { width:100%; padding:10px 12px; border-radius:8px; border:1px solid #1f2a44; background:#0d1324; color:#e5e7eb; }
    button { padding:10px 14px; border:none; border-radius:8px; background:#2563eb; color:white; font-weight:600; cursor:pointer; }
    button.secondary { background:#1f2937; color:#d1d5db; }
    button:disabled { opacity:0.6; cursor:not-allowed; }
    .muted { color:#9ca3af; font-size:12px; }
    .stat { font-size:26px; font-weight:700; }
    .badge { display:inline-block; padding:4px 8px; border-radius:999px; background:#1f2937; color:#9ca3af; font-size:11px; }
    .flex { display:flex; gap:12px; align-items:center; justify-content:space-between; }
    .list { list-style:none; padding:0; margin:0; }
    .list li { display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid #1f2a44; }
    .error { color:#f87171; font-size:13px; margin-top:6px; }
    .success { color:#34d399; font-size:13px; margin-top:6px; }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div>
        <div class="badge">Dashboard Admin</div>
        <h1>Renace Analytics</h1>
        <p class="muted">Visitas, ventas y chats (protegido por código al correo administrador).</p>
      </div>
      <div id="login-status" class="muted">No autenticado</div>
    </header>

    <div class="card" id="login-card">
      <h2>Acceso seguro</h2>
      <div class="grid" style="grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap:12px;">
        <div>
          <label for="email">Correo administrador</label>
          <input id="email" type="email" value="expertostird@gmail.com" autocomplete="email">
        </div>
        <div class="flex" style="align-items:flex-end; gap:8px;">
          <div style="flex:1;">
            <label for="code">Código recibido</label>
            <input id="code" type="text" placeholder="6 dígitos" inputmode="numeric" autocomplete="one-time-code">
          </div>
          <div style="display:flex; gap:8px;">
            <button id="btn-request">Enviar código</button>
            <button id="btn-verify" class="secondary">Validar</button>
          </div>
        </div>
      </div>
      <div id="login-message" class="muted" style="margin-top:8px;"></div>
    </div>

    <div id="stats" class="card" style="display:none;">
      <div class="grid grid-3">
        <div>
          <div class="muted">Visitas totales</div>
          <div class="stat" id="visits-total">-</div>
          <div class="muted" id="visits-24h">-</div>
        </div>
        <div>
          <div class="muted">Ventas (muestra)</div>
          <div class="stat" id="sales-count">-</div>
          <div class="muted" id="sales-total">-</div>
        </div>
        <div>
          <div class="muted">Chats</div>
          <div class="stat">n/d</div>
          <div class="muted">Proxy /api/chat sin métrica local</div>
        </div>
      </div>
    </div>

    <div id="lists" class="grid" style="display:none; grid-template-columns: repeat(auto-fit, minmax(300px,1fr));">
      <div class="card">
        <h3>Top rutas</h3>
        <ul id="top-paths" class="list"></ul>
      </div>
      <div class="card">
        <h3>Estados HTTP</h3>
        <ul id="status-codes" class="list"></ul>
      </div>
      <div class="card">
        <h3>Ventas recientes</h3>
        <ul id="sales-sample" class="list"></ul>
      </div>
    </div>
  </div>

  <script src="/js/admin-dashboard.js"></script>
</body>
</html>
