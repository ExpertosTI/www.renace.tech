<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RENACE App - Cargando</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #0a0e17 0%, #111827 100%);
      color: #ffffff;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    
    .splash-container {
      text-align: center;
      padding: 40px;
    }
    
    .logo {
      width: 120px;
      height: 120px;
      margin: 0 auto 30px;
      position: relative;
    }
    
    .logo svg {
      width: 100%;
      height: 100%;
      filter: drop-shadow(0 0 30px rgba(125, 211, 252, 0.5));
    }
    
    .logo::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(125, 211, 252, 0.2) 0%, transparent 70%);
      animation: pulse 2s ease-in-out infinite;
    }
    
    @keyframes pulse {
      0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.5; }
      50% { transform: translate(-50%, -50%) scale(1.2); opacity: 0; }
    }
    
    .brand-name {
      font-size: 28px;
      font-weight: 700;
      background: linear-gradient(135deg, #7dd3fc 0%, #38bdf8 50%, #2dd4bf 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
      letter-spacing: 0.5px;
    }
    
    .tagline {
      font-size: 13px;
      color: #64748b;
      margin-bottom: 40px;
      font-weight: 400;
    }
    
    .loading-bar {
      width: 200px;
      height: 3px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 3px;
      overflow: hidden;
      margin: 0 auto 20px;
    }
    
    .loading-progress {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #7dd3fc 0%, #2dd4bf 100%);
      border-radius: 3px;
      animation: loading 1.5s ease-in-out infinite;
    }
    
    @keyframes loading {
      0% { width: 0%; transform: translateX(-100%); }
      50% { width: 100%; transform: translateX(0%); }
      100% { width: 100%; transform: translateX(100%); }
    }
    
    .loading-text {
      font-size: 12px;
      color: #475569;
      animation: fade 1.5s ease-in-out infinite;
    }
    
    @keyframes fade {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }
    
    .version {
      position: absolute;
      bottom: 20px;
      font-size: 11px;
      color: #334155;
    }
  </style>
</head>
<body>
  <div class="splash-container">
    <div class="logo">
      <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="50" cy="50" r="45" stroke="#1e3a5f" stroke-width="2"/>
        <circle cx="50" cy="50" r="35" stroke="#2563eb" stroke-width="2" stroke-dasharray="4 4"/>
        <circle cx="50" cy="50" r="25" fill="url(#gradient1)" fill-opacity="0.3"/>
        <circle cx="50" cy="50" r="15" fill="url(#gradient2)"/>
        <defs>
          <linearGradient id="gradient1" x1="50" y1="25" x2="50" y2="75" gradientUnits="userSpaceOnUse">
            <stop stop-color="#7dd3fc"/>
            <stop offset="1" stop-color="#2dd4bf"/>
          </linearGradient>
          <linearGradient id="gradient2" x1="50" y1="35" x2="50" y2="65" gradientUnits="userSpaceOnUse">
            <stop stop-color="#38bdf8"/>
            <stop offset="1" stop-color="#22d3ee"/>
          </linearGradient>
        </defs>
      </svg>
    </div>
    <div class="brand-name">RENACE</div>
    <div class="tagline">Digitaliza tu negocio</div>
    <div class="loading-bar">
      <div class="loading-progress"></div>
    </div>
    <div class="loading-text">Iniciando aplicación...</div>
  </div>
  <div class="version">v1.0.0</div>
</body>
</html>
